<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SWILL TV</title>
    <style>
        body { background: black; color: white; text-align: center; font-family: Arial; margin: 0; padding: 0; }
        .video-container { width: 80%; max-width: 1000px; margin: 50px auto; }
        iframe { width: 100%; height: 500px; border: none; }
        @media (max-width: 768px) { iframe { height: 300px; } }
    </style>
</head>
<body>
    <h1>🔴 SWILL TV</h1>
    <div class="video-container">
        <iframe id="player" src="" frameborder="0" allow="autoplay; fullscreen"></iframe>
    </div>
    <p>Прямой эфир</p>

    <script>
        async function loadVideo() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                const data = await response.json();
                const videoId = data.videoId;
                if (videoId) {
                    const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&showinfo=0&controls=1&rel=0`;
                    document.getElementById('player').src = embedUrl;
                }
            } catch(e) {
                console.error('Ошибка загрузки videoId');
            }
        }
        loadVideo();
        setInterval(loadVideo, 30000);
    </script>
</body>
</html>
